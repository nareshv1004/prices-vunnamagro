name: Nightly Buyer Intelligence Crawl

on:
  schedule:
    # 02:00 UTC daily — off-peak, after midnight IST
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      product:
        description: 'Single product to refresh (leave blank for all)'
        required: false
      country:
        description: 'Single country to refresh (leave blank for all)'
        required: false

jobs:
  crawl:
    name: Crawl ${{ matrix.product }} / ${{ matrix.country }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4        # 4 concurrent crawls — stays within CF free tier
      matrix:
        product:
          - Dry Red Chillies
          - Chilli Powder
          - Chilli Flakes
          - Kabuli Chana
          - Kala Chana
          - Mung Whole
          - Toor Dal
          - Moong Dal
        country:
          - UAE
          - Saudi Arabia
          - United Kingdom
          - United States
          - Malaysia
          - Singapore
          - Germany
          - Australia
          - Qatar
          - Kuwait
          - Bangladesh
          - Sri Lanka

    steps:
      - name: Skip if manual run targets a specific product/country
        if: >
          (github.event.inputs.product != '' && github.event.inputs.product != matrix.product) ||
          (github.event.inputs.country != '' && github.event.inputs.country != matrix.country)
        run: echo "Skipping ${{ matrix.product }} / ${{ matrix.country }}" && exit 0

      - name: Trigger crawl
        id: crawl
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRAWL_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"product\":\"${{ matrix.product }}\",\"country\":\"${{ matrix.country }}\"}" \
            "${{ secrets.CF_PAGES_URL }}/crawl-buyers")

          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::warning::Crawl failed for ${{ matrix.product }} / ${{ matrix.country }} (HTTP $HTTP_STATUS)"
            exit 1
          fi

          COUNT=$(cat /tmp/response.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('count',0))")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT buyers for ${{ matrix.product }} in ${{ matrix.country }}"

      - name: Summary
        if: always()
        run: |
          echo "### ${{ matrix.product }} / ${{ matrix.country }}" >> $GITHUB_STEP_SUMMARY
          echo "Buyers found: ${{ steps.crawl.outputs.count || 0 }}" >> $GITHUB_STEP_SUMMARY
